name: Update Vector Store (Qdrant)

on:
  deployment_status:

  # Allow manual triggering with custom slugs
  workflow_dispatch:
    inputs:
      upsert_slugs:
        description: "Comma-separated slugs to upsert (e.g. api,closure)"
        required: false
      delete_slugs:
        description: "Comma-separated slugs to delete (e.g. old-term)"
        required: false

jobs:
  update-vector-store:
    runs-on: ubuntu-latest

    # Only run on successful production deployments (or manual trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.deployment_status.state == 'success' &&
        github.event.deployment.environment == 'Production'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch enough history to diff against the previous commit
          fetch-depth: 2

      - name: Detect changed dictionary files
        id: detect-changes
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "Detecting dictionary file changes..."

          UPSERT_SLUGS=""
          DELETE_SLUGS=""

          # Compare HEAD with its parent to find changed dictionary files
          while IFS=$'\t' read -r status file; do
            # Only process files in src/content/dictionary/
            if [[ "$file" == src/content/dictionary/*.mdx ]]; then
              # Extract slug from filename (e.g. src/content/dictionary/api.mdx -> api)
              slug=$(basename "$file" .mdx)

              if [[ "$status" == "D" ]]; then
                # File was deleted
                if [ -n "$DELETE_SLUGS" ]; then
                  DELETE_SLUGS="$DELETE_SLUGS,$slug"
                else
                  DELETE_SLUGS="$slug"
                fi
              else
                # File was added (A), modified (M), or renamed (R*)
                if [ -n "$UPSERT_SLUGS" ]; then
                  UPSERT_SLUGS="$UPSERT_SLUGS,$slug"
                else
                  UPSERT_SLUGS="$slug"
                fi
              fi
            fi
          done < <(git diff --name-status HEAD~1 -- src/content/dictionary/)

          echo "upsert_slugs=$UPSERT_SLUGS" >> "$GITHUB_OUTPUT"
          echo "delete_slugs=$DELETE_SLUGS" >> "$GITHUB_OUTPUT"

          if [ -z "$UPSERT_SLUGS" ] && [ -z "$DELETE_SLUGS" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No dictionary changes detected. Skipping update."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Upsert slugs: $UPSERT_SLUGS"
            echo "Delete slugs: $DELETE_SLUGS"
          fi

      - name: Resolve slugs
        id: resolve-slugs
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "upsert=${{ github.event.inputs.upsert_slugs }}" >> "$GITHUB_OUTPUT"
            echo "delete=${{ github.event.inputs.delete_slugs }}" >> "$GITHUB_OUTPUT"

            if [ -z "${{ github.event.inputs.upsert_slugs }}" ] && [ -z "${{ github.event.inputs.delete_slugs }}" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "upsert=${{ steps.detect-changes.outputs.upsert_slugs }}" >> "$GITHUB_OUTPUT"
            echo "delete=${{ steps.detect-changes.outputs.delete_slugs }}" >> "$GITHUB_OUTPUT"
            echo "skip=${{ steps.detect-changes.outputs.has_changes != 'true' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no changes
        if: steps.resolve-slugs.outputs.skip == 'true'
        run: echo "✅ No dictionary changes to process. Skipping."

      - name: Setup Node.js
        if: steps.resolve-slugs.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.resolve-slugs.outputs.skip != 'true'
        run: npm ci

      - name: Update vector store
        if: steps.resolve-slugs.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_EMBEDDINGS_MODEL: ${{ vars.OPENAI_EMBEDDINGS_MODEL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          ARGS=""

          if [ -n "${{ steps.resolve-slugs.outputs.upsert }}" ]; then
            ARGS="$ARGS --upsert ${{ steps.resolve-slugs.outputs.upsert }}"
          fi

          if [ -n "${{ steps.resolve-slugs.outputs.delete }}" ]; then
            ARGS="$ARGS --delete ${{ steps.resolve-slugs.outputs.delete }}"
          fi

          echo "Running: npm run update:jai:ci -- $ARGS"
          npm run update:jai:ci -- $ARGS

      - name: Update successful
        if: steps.resolve-slugs.outputs.skip != 'true'
        run: echo "✅ Vector store update completed successfully"
